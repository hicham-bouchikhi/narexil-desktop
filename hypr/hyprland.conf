# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

# Toolkit Backend Variables

env = WAYLAND_DISPLAY,wayland-1
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# Theme & Desktop Styling
# Note: Keep QT_QPA_PLATFORMTHEME as kde if you want to use KDE's plugin for icons/fonts
env = QT_QPA_PLATFORMTHEME,kde
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = KDE_FULL_SESSION,true
env = KDE_SESSION_VERSION,6
env = KDE_SESSION_UID,1000
env = XDG_MENU_PREFIX,plasma-
# Cursor Size
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# NVIDIA Specifics
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = NVD_BACKEND,direct
env = XDG_CONFIG_DIRS,/home/esperadoce/.config/kdedefaults:/etc/xdg
env = XDG_DATA_DIRS,/home/esperadoce/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

env = PASSWORD_STORE,kwalletd6

# Electron apps (Proton Pass, etc.) - use native Wayland rendering
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = XDG_MENU_PREFIX,plasma-

################
### MONITORS ###
################

source = ~/.config/hypr/monitors.conf


#################
### AUTOSTART ###
#################

source = ~/.config/hypr/autostart.conf

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


###################
### KEYBINDINGS ###
###################
source= ~/.config/hypr/bind.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/general.conf

##############################
##### Hyprland plugin ########
##############################
source = ~/.config/hypr/plugin.conf

